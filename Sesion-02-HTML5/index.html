<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Sitio — Inicio</title>
  <link rel="stylesheet" href="styles.css">
  <!-- TODO: agrega meta description, autor, favicon -->
</head>
<body>

  <header>
    <h1>Mi Sitio</h1>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="pagina1.html">Pagina 1</a></li>
        <li><a href="pagina2.html">Pagina 2</a></li>
        <li><a href="pagina3.html">Pagina 3</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <article>
      <h2>Bienvenido</h2>

      <figure>
        <img src="image/local.svg"
             alt="Imagen de bienvenida"
             width="400" height="200"
             loading="lazy">
        <figcaption>Imagen local de bienvenida</figcaption>
      </figure>

      <p>Parrafo de introduccion. Lorem ipsum dolor sit amet.</p>

      <!-- TODO: usa <dialog> + un boton con command/commandfor (Invoker Commands API) -->
      <dialog id="bienvenida">
        <h3>Hola!</h3>
        <p>Esto es un dialog modal nativo.</p>
        <form method="dialog">
          <button>Cerrar</button>
        </form>
      </dialog>
      <button command="show-modal" commandfor="bienvenida">
        Abrir dialog
      </button>

      <!-- TODO: usa popover para un menu o tooltip -->
      <button popovertarget="menu-ayuda">?</button>
      <div id="menu-ayuda" popover>
        <h4>Ayuda</h4>
        <p>Contenido del popover...</p>
      </div>

      <!-- TODO: formulario con al menos 3 inputs (text, email, etc.) -->
      <form action="#" method="POST">
        <label for="nombre">Nombre:</label>
        <input id="nombre" type="text" name="nombre" required minlength="3">

        <label for="email">Email:</label>
        <input id="email" type="email" name="email" required>

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" rows="4"></textarea>

        <button type="submit">Enviar</button>
      </form>
    </article>

    <!-- TODO: usa <aside> para contenido lateral -->
  </main>

  <footer>
    <p>&copy; 2026 Mi Sitio — Universidad Mariano Galvez</p>
  </footer>

</body>
</html>
